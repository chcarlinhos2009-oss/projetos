<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Simples</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Estilização básica para organizar as telas */
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0F3D73;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0c305b;
        }
        .logout-btn {
            background-color: #d9534f;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="tela-acesso">
            <h2 style="color: #0F3D73;">Logística Simples</h2>
            <p>Crie sua conta local neste aparelho</p>
            <input type="email" id="input-email" placeholder="Seu e-mail">
            <input type="password" id="input-senha" placeholder="Sua senha">
            <button onclick="cadastrarUsuarioLocal()">Criar Conta Local</button>
        </div>

        <div id="painel-app" style="display: none;">
            <h2 style="color: #0F3D73;">Painel de Controle</h2>
            <p>Você está conectado! Seus dados de estoque estão seguros aqui.</p>
            
            <button class="logout-btn" onclick="fazerLogoutLocal()">Sair da Conta</button>
        </div>
    </div>

    <script>
        // --- BANCO DE DADOS LOCAL E PERSISTÊNCIA ---

        // Executa assim que a página abre no celular/PC
        window.onload = function() {
            verificarUsuarioLogado();
        };

        function verificarUsuarioLogado() {
            // Verifica no armazenamento do aparelho se o usuário já fez login antes
            const usuarioLogado = localStorage.getItem("logistica_usuario_logado");

            if (usuarioLogado === "true") {
                exibirPainelPrincipal(); // Pula direto para o app
            } else {
                exibirTelaLoginCadastro(); // Mostra a tela de cadastro
            }
        }

        function cadastrarUsuarioLocal() {
            const email = document.getElementById('input-email').value;
            const senha = document.getElementById('input-senha').value;

            if (!email || !senha) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // Grava os dados direto na memória interna do navegador
            localStorage.setItem("logistica_user_email", email);
            localStorage.setItem("logistica_user_password", senha);
            
            // Define o status como logado para as próximas visitas
            localStorage.setItem("logistica_usuario_logado", "true");

            alert("Conta criada localmente!");
            exibirPainelPrincipal();
        }

        function fazerLogoutLocal() {
            // Altera o status para "false", para que o login seja pedido se ele quiser mudar de usuário
            localStorage.setItem("logistica_usuario_logado", "false");
            window.location.reload(); // Recarrega a página para aplicar
        }

        // Funções para alternar as telas visualmente
        function exibirPainelPrincipal() {
            document.getElementById("tela-acesso").style.display = "none";
            document.getElementById("painel-app").style.display = "block";
        }

        function exibirTelaLoginCadastro() {
            document.getElementById("tela-acesso").style.display = "block";
            document.getElementById("painel-app").style.display = "none";
        }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker ativo!'))
          .catch(err => console.error('Erro no Service Worker', err));
      }
    </script>
</body>
</html>
