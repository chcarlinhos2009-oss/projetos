<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Inteligente - Categorias Ativas</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0A4B99',
                        secondary: '#1E68C4',
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }
        .responsive-table {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media print {
            body { background: white !important; padding: 0; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; }
            .border { border: 1px solid #ddd !important; }
            tr { page-break-inside: avoid; }
        }
        .print-only { display: none; }
    </style>
</head>

<body class="p-4 sm:p-6 bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen">

    <div id="print-area" class="print-only max-w-4xl mx-auto p-4"></div>
    <div id="app" class="no-print max-w-4xl mx-auto"></div>

    <script>
        // === ESTADO DO SISTEMA ===
        let perfilGlobal = '';
        let schoolGlobal = ''; 
        let usuarioCadastrado = 'admin@admin.com'; 
        let senhaCadastrada = '123';
        
        let limiteEstoqueBaixo = 10; 
        let modoEscuroAtivo = false;
        let notificacoesAtivas = true;

        // BANCO DE DADOS INICIAL TOTALMENTE LIMPO
        let dbProdutos = [];
        let dbCategorias = []; // Removidas as categorias padrão para iniciar limpo
        let dbFornecedores = [];
        let dbMovimentacoes = [];

        function atualizarStatusProdutos() {
            if (!dbProdutos) return;
            dbProdutos.forEach(p => {
                p.status = p.qtd > limiteEstoqueBaixo ? 'OK' : 'Baixo';
                p.statusCor = p.qtd > limiteEstoqueBaixo ? 'green' : 'red';
            });
        }

        // ================= TELA INICIAL =================
        function telaInicial() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto text-center fade-in mt-10 px-2">
                <i class="fas fa-school text-blue-600 text-6xl mb-4"></i>
                <h1 class="text-4xl font-bold mb-2 text-gray-800 dark:text-white">Logística Escolar</h1>
                <p class="text-gray-500 dark:text-gray-400 mb-8">Selecione seu perfil de acesso</p>
                <div class="space-y-4">
                    <button onclick="abrirLogin('Gestor')" class="w-full bg-primary hover:bg-blue-800 text-white p-4 rounded-xl transition-all font-semibold">
                        <i class="fas fa-user-tie mr-2"></i> Gestor
                    </button>
                    <button onclick="abrirLogin('Funcionário')" class="w-full bg-primary hover:bg-blue-800 text-white p-4 rounded-xl transition-all font-semibold">
                        <i class="fas fa-user-tag mr-2"></i> Funcionário
                    </button>
                </div>
            </div>`;
        }

        // ================= LOGIN =================
        function abrirLogin(perfil) {
            perfilGlobal = perfil;
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto fade-in mt-10 bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700">
                <h2 class="text-2xl font-bold mb-2 text-gray-800 dark:text-white">Acesso ao Sistema</h2>
                <p class="text-blue-600 dark:text-blue-400 mb-6 font-medium italic">Perfil atual: ${perfil}</p>
                <div id="mensagem-erro" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm"></div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Identificação da Unidade</label>
                        <input id="escola" type="text" placeholder="Nome da Escola / Instituição" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Credenciais</label>
                        <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none mb-2">
                        <input id="senha" type="password" placeholder="Senha" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none">
                    </div>
                    
                    <button onclick="validarLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all shadow-md">
                        Entrar e Conectar Dados
                    </button>
                    <button onclick="abrirCadastro()" class="w-full text-blue-600 dark:text-blue-400 text-sm font-semibold mt-2">Cadastre-se</button>
                </div>
                <button onclick="telaInicial()" class="mt-8 text-gray-400 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Voltar</button>
            </div>`;
        }

        function abrirCadastro() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto fade-in mt-10 bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Cadastro</h2>
                <input id="emailCad" type="email" placeholder="Novo Email" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white mb-4">
                <input id="senhaCad" type="password" placeholder="Nova Senha" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white mb-4">
                <button onclick="salvarCadastro()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Salvar</button>
            </div>`;
        }

        function salvarCadastro() {
            usuarioCadastrado = document.getElementById('emailCad').value;
            senhaCadastrada = document.getElementById('senhaCad').value;
            alert('✅ Cadastro realizado com sucesso!');
            abrirLogin(perfilGlobal);
        }

        function validarLogin() {
            const escola = document.getElementById('escola').value.trim();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if (!escola) {
                document.getElementById('mensagem-erro').classList.remove('hidden');
                document.getElementById('mensagem-erro').innerText = "Por favor, digite o nome da escola.";
                return;
            }

            if ((email === usuarioCadastrado && senha === senhaCadastrada) || (email === 'admin@admin.com' && senha === '123') || perfilGlobal === 'Funcionário') {
                schoolGlobal = escola; 
                entrarSistema();
            } else {
                document.getElementById('mensagem-erro').classList.remove('hidden');
                document.getElementById('mensagem-erro').innerText = "Dados de login incorretos.";
            }
        }

        // ================= DASHBOARD =================
        function entrarSistema() {
            atualizarStatusProdutos();
            const produtosCriticos = dbProdutos ? dbProdutos.filter(p => p.qtd <= limiteEstoqueBaixo) : [];
            let bannerAlerta = '';
            
            if (produtosCriticos.length > 0 && notificacoesAtivas) {
                bannerAlerta = `
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl text-red-800 dark:bg-red-900/20 dark:text-red-300 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-bell animate-bounce text-xl text-red-600"></i>
                        <span class="text-sm font-medium">Aviso: <strong>${produtosCriticos.length} item(s)</strong> na lista crítica de estoque baixo!</span>
                    </div>
                    <button onclick="abrirTela('produtos')" class="text-xs uppercase font-bold underline">Ver Itens</button>
                </div>`;
            }

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-8 bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div>
                        <h1 class="text-xl font-bold flex items-center gap-2 text-gray-800 dark:text-white truncate max-w-[180px] sm:max-w-none">
                            <i class="fas fa-school text-blue-600"></i> ${schoolGlobal.toUpperCase()}
                        </h1>
                        <p class="text-xs text-blue-600 dark:text-blue-400 font-medium">Operador: ${perfilGlobal}</p>
                    </div>
                    <button onclick="telaInicial()" class="text-red-600 font-bold hover:underline text-sm"><i class="fas fa-sign-out-alt"></i> Desconectar</button>
                </div>
                
                ${bannerAlerta}
                
                <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4">
                    <button onclick="abrirTela('produtos')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-boxes text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Produtos</h3><p class="text-xs text-gray-400">Ver e gerenciar estoque</p>
                    </button>
                    <button onclick="abrirTela('categories')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-tags text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Categorias</h3><p class="text-xs text-gray-400">Filtro ativo por divisão</p>
                    </button>
                    <button onclick="abrirTela('fornecedores')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-truck text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Fornecedores</h3><p class="text-xs text-gray-400">Lista de parceiros</p>
                    </button>
                    <button onclick="abrirTela('movimentacoes')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-exchange-alt text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Movimentações</h3><p class="text-xs text-gray-400">Histórico de entradas e saídas</p>
                    </button>
                    <button onclick="abrirTela('relatorios')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-chart-line text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Relatórios</h3><p class="text-xs text-gray-400">Balanços e impressão</p>
                    </button>
                    <button onclick="${perfilGlobal === 'Gestor' ? "abrirTela('configuracoes')" : "alert('❌ Acesso Restrito: Apenas o Gestor pode alterar as configurações.')"}" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left ${perfilGlobal !== 'Gestor' ? 'opacity-60 cursor-not-allowed' : ''}">
                        <i class="fas fa-cog text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Configurações ${perfilGlobal !== 'Gestor' ? '🔒' : ''}</h3><p class="text-xs text-gray-400">Parâmetros do sistema</p>
                    </button>
                </div>
            </div>`;
        }

        function abrirTela(tela) {
            if (tela === 'produtos') renderizarProdutos();
            else if (tela === 'categories') renderizarCategorias();
            else if (tela === 'fornecedores') renderizarFornecedores();
            else if (tela === 'movimentacoes') renderizarMovimentacoes();
            else if (tela === 'relatorios') renderizarRelatorios();
            else if (tela === 'configuracoes') renderizarConfiguracoes();
        }

        // ================= PRODUTOS & OCR DA FOTO DA LISTA =================
        function renderizarProdutos() {
            atualizarStatusProdutos();
            let linhas = '';
            if (dbProdutos && dbProdutos.length > 0) {
                linhas = dbProdutos.map((p, index) => `
                    <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm">
                        <td class="p-3 font-semibold">
                            ${p.nome} 
                            <span class="block text-xs text-blue-500 font-normal italic">${p.categoria || 'Sem Categoria'}</span>
                        </td>
                        <td class="p-3">${p.qtd} un</td>
                        <td class="p-3"><span class="bg-${p.statusCor}-100 text-${p.statusCor}-700 dark:bg-${p.statusCor}-900/30 dark:text-${p.statusCor}-400 px-2 py-1 rounded text-xs font-bold">${p.status}</span></td>
                        <td class="p-3 text-right space-x-2 whitespace-nowrap">
                            <button onclick="abrirFormProd(${index})" class="text-orange-500 font-bold hover:underline">Editar</button>
                            ${perfilGlobal === 'Gestor' ? `<button onclick="excluirProd(${index})" class="text-red-500 font-bold hover:underline">Excluir</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            }

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h1 class="text-2xl font-bold">📦 Estoque - ${schoolGlobal}</h1>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        
                        <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 text-sm cursor-pointer shadow-md">
                            <i class="fas fa-camera"></i> Escanear Lista por Foto
                            <input type="file" accept="image/*" capture="environment" onchange="processarFotoLista(event)" class="hidden">
                        </label>

                        <button onclick="abrirFormProd()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-lg font-bold text-sm">+ Manual</button>
                        <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2.5 rounded-lg font-bold text-sm">Voltar</button>
                    </div>
                </div>

                <div id="loading-ocr" class="hidden bg-white dark:bg-gray-800 p-6 rounded-xl border dark:border-gray-700 mb-6 text-center">
                    <i class="fas fa-circle-notch animate-spin text-blue-600 text-4xl mb-3"></i>
                    <p class="font-bold text-lg">Analisando sua lista de itens...</p>
                    <p class="text-gray-400 text-sm mt-1">Por favor, aguarde. O motor OCR está extraindo texto e quantidades.</p>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 responsive-table">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 text-xs font-bold uppercase">
                                <th class="p-3">Produto</th><th class="p-3">Qtd</th><th class="p-3">Status</th><th class="p-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="4" class="p-6 text-center text-gray-400 text-sm italic">Nenhum produto cadastrado. Tire uma foto da sua lista escrita acima!</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // ================= PROCESSAMENTO INTELIGENTE DA IMAGEM (OCR) =================
        async function processarFotoLista(event) {
            const file = event.target.files[0];
            if (!file) return;

            const loader = document.getElementById("loading-ocr");
            loader.classList.remove("hidden");

            try {
                const resultado = await Tesseract.recognize(file, 'por', {
                    logger: m => console.log(m)
                });

                const textoExtraido = resultado.data.text;
                console.log("Texto extraído:", textoExtraido);

                const linhas = textoExtraido.split("\n");
                let itensAdicionadosCount = 0;

                linhas.forEach(linha => {
                    linha = inline = linha.trim();
                    if (!linha) return;

                    const numerosEncontrados = linha.match(/\d+/);
                    
                    if (numerosEncontrados) {
                        const qtd = parseInt(numerosEncontrados[0]);
                        let nome = linha.replace(numerosEncontrados[0], "")
                                        .replace(/[-_=:;]/g, "")
                                        .trim();

                        if (nome.length >= 2) {
                            nome = nome.charAt(0).toUpperCase() + nome.slice(1);
                            const status = qtd > limiteEstoqueBaixo ? 'OK' : 'Baixo';
                            const statusCor = qtd > limiteEstoqueBaixo ? 'green' : 'red';

                            // Associa automaticamente a uma categoria básica se achar palavras-chave
                            let categoriaPadrao = "Sem Categoria";
                            const nomeMinusculo = nome.toLowerCase();
                            if (nomeMinusculo.includes("tablet") || nomeMinusculo.includes("notebook") || nomeMinusculo.includes("pc") || nomeMinusculo.includes("computador") || nomeMinusculo.includes("fone")) {
                                categoriaPadrao = "Tecnologia";
                            } else if (nomeMinusculo.includes("papel") || nomeMinusculo.includes("caneta") || nomeMinusculo.includes("lapis") || nomeMinusculo.includes("borracha") || nomeMinusculo.includes("caderno")) {
                                categoriaPadrao = "Papelaria";
                            }

                            dbProdutos.push({ nome, qtd, status, statusCor, categoria: categoriaPadrao });
                            
                            dbMovimentacoes.push({
                                tipo: 'Entrada (Foto)',
                                produto: nome,
                                qtd: qtd,
                                data: new Date().toLocaleDateString('pt-BR')
                            });

                            itensAdicionadosCount++;
                        }
                    }
                });

                loader.classList.add("hidden");
                
                if (itensAdicionadosCount > 0) {
                    alert(`🎉 Sucesso! Identificamos e adicionamos ${itensAdicionadosCount} produtos da sua lista automaticamente.`);
                } else {
                    alert("⚠️ Não conseguimos extrair quantidades numéricas claras da foto. Tente tirar a foto com mais luz e com as letras legíveis.");
                }

                renderizarProdutos();

            } catch (error) {
                loader.classList.add("hidden");
                alert("❌ Ocorreu um erro ao processar a imagem. Tente novamente.");
                console.error(error);
            }
        }

        // ================= FORMULÁRIO DO PRODUTO (MANUAL OU EDIÇÃO) =================
        function abrirFormProd(index = null) {
            const p = (index !== null && dbProdutos[index]) ? dbProdutos[index] : { nome: '', qtd: '', categoria: '' };
            
            // Gera as opções de categorias cadastradas para o seletor dropdown
            const opcoesCategorias = dbCategorias.map(cat => `
                <option value="${cat.nome}" ${p.categoria === cat.nome ? 'selected' : ''}>${cat.nome}</option>
            `).join('');

            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <h2 class="text-xl font-bold mb-6">${index !== null ? 'Editar' : 'Adicionar'} Produto</h2>
                
                <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Nome do Item</label>
                <input id="pNome" placeholder="Ex: Notebook Positivo" value="${p.nome}" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                
                <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Quantidade</label>
                <input id="pQtd" type="number" placeholder="Quantidade" value="${p.qtd}" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                
                <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Categoria</label>
                <select id="pCategoria" class="w-full p-3 border rounded-lg mb-6 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                    <option value="">Selecione uma Categoria</option>
                    ${opcoesCategorias}
                </select>

                <button onclick="salvarProd(${index})" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-md">Salvar</button>
                <button onclick="renderizarProdutos()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>`;
        }

        function salvarProd(index) {
            const n = document.getElementById('pNome').value.trim();
            const q = parseInt(document.getElementById('pQtd').value);
            const c = document.getElementById('pCategoria').value;
            if (!n || isNaN(q)) { alert("Preencha de forma válida."); return; }

            const status = q > limiteEstoqueBaixo ? 'OK' : 'Baixo';
            const statusCor = q > limiteEstoqueBaixo ? 'green' : 'red';
            
            if (index !== null && dbProdutos[index]) {
                dbProdutos[index] = { nome: n, qtd: q, status, statusCor, categoria: c };
            } else {
                dbProdutos.push({ nome: n, qtd: q, status, statusCor, categoria: c });
            }

            dbMovimentacoes.push({
                tipo: 'Ajuste Manual',
                produto: n,
                qtd: q,
                data: new Date().toLocaleDateString('pt-BR')
            });

            renderizarProdutos();
        }

        function excluirProd(index) { 
            if(confirm("Deseja realmente excluir este item?")) { 
                dbProdutos.splice(index, 1); 
                renderizarProdutos(); 
            } 
        }

        // ================= CATEGORIAS (CLICÁVEIS E ATIVAS) =================
        function renderizarCategorias() {
            let linhas = '';
            if (dbCategorias && dbCategorias.length > 0) {
                linhas = dbCategorias.map((cat, index) => {
                    // Conta quantos produtos pertencem a essa categoria
                    const totalItens = dbProdutos.filter(p => p.categoria === cat.nome).length;

                    return `
                    <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                        <td class="p-3">
                            <button onclick="filtrarProdutosPorCategoria('${cat.nome}')" class="text-left font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                                <i class="fas fa-folder-open mr-2"></i>${cat.nome}
                                <span class="block text-xs text-gray-400 font-normal">Contém ${totalItens} item(s)</span>
                            </button>
                        </td>
                        <td class="p-3 text-right">
                            <button onclick="excluirCat(${index})" class="text-red-500 font-bold hover:underline">Excluir</button>
                        </td>
                    </tr>`;
                }).join('');
            }
            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-xl font-bold">Categorias</h1>
                        <p class="text-xs text-gray-400">Clique no nome de uma categoria para ver os itens relacionados</p>
                    </div>
                    <div class="space-x-2">
                        <button onclick="abrirFormCat()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">+ Nova Categoria</button>
                        <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold text-sm">Voltar</button>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 text-xs font-bold uppercase">
                                <th class="p-3">Categoria</th><th class="p-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="2" class="p-4 text-center text-gray-400">Nenhuma categoria registrada. Clique em "+ Nova Categoria" acima para criar uma!</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // TELA DE FILTRO: MOSTRA ITENS DA CATEGORIA SELECIONADA
        function filtrarProdutosPorCategoria(nomeCategoria) {
            const itensFiltrados = dbProdutos.filter(p => p.categoria === nomeCategoria);
            let linhas = '';

            if (itensFiltrados.length > 0) {
                linhas = itensFiltrados.map(p => `
                    <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm">
                        <td class="p-3 font-semibold">${p.nome}</td>
                        <td class="p-3">${p.qtd} un</td>
                        <td class="p-3"><span class="bg-${p.statusCor}-100 text-${p.statusCor}-700 dark:bg-${p.statusCor}-900/30 dark:text-${p.statusCor}-400 px-2 py-1 rounded text-xs font-bold">${p.status}</span></td>
                    </tr>
                `).join('');
            }

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <span class="text-xs font-bold uppercase text-blue-500">Filtrando Categoria</span>
                        <h1 class="text-2xl font-bold flex items-center gap-2">
                            <i class="fas fa-folder-open text-yellow-500"></i> ${nomeCategoria}
                        </h1>
                    </div>
                    <button onclick="renderizarCategorias()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold text-sm">Voltar para Categorias</button>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 responsive-table">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 text-xs font-bold uppercase">
                                <th class="p-3">Produto</th><th class="p-3">Qtd</th><th class="p-3">Status</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="3" class="p-6 text-center text-gray-400 text-sm italic">Nenhum produto cadastrado nesta categoria ainda.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        function abrirFormCat() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <h2 class="text-xl font-bold mb-6">Nova Categoria</h2>
                <input id="cNome" placeholder="Ex: Tecnologia" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <button onclick="salvarCat()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Salvar</button>
                <button onclick="renderizarCategorias()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>`;
        }

        function salvarCat() {
            const n = document.getElementById('cNome').value.trim();
            if(n) dbCategorias.push({ nome: n });
            renderizarCategorias();
        }

        function excluirCat(index) { 
            if(confirm("Excluir esta categoria? Os itens que estavam nela continuarão existindo, mas ficarão sem categoria.")) {
                const catNome = dbCategorias[index].nome;
                // Desassocia os produtos que pertenciam à categoria deletada
                dbProdutos.forEach(p => {
                    if (p.categoria === catNome) p.categoria = '';
                });
                dbCategorias.splice(index, 1); 
                renderizarCategorias(); 
            }
        }

        // ================= FORNECEDORES =================
        function renderizarFornecedores() {
            let lines = '';
            if (dbFornecedores && dbFornecedores.length > 0) {
                lines = dbFornecedores.map((f, index) => `
                    <tr class="border-b dark:border-gray-700">
                        <td class="p-3 font-bold">${f.nome}</td>
                        <td class="p-3 text-right">
                            <button onclick="excluirFornecedor(${index})" class="text-red-500 font-bold">Excluir</button>
                        </td>
                    </tr>
                `).join('');
            }
            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-bold">Fornecedores</h1>
                    <div class="space-x-2">
                        <button onclick="abrirFormFornecedor()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">+ Novo Fornecedor</button>
                        <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold text-sm">Voltar</button>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border dark:border-gray-700"><table class="w-full text-left"><tbody>${lines || '<tr><td class="p-4 text-center text-gray-400">Nenhum fornecedor registrado.</td></tr>'}</tbody></table></div>
            </div>`;
        }

        function abrirFormFornecedor() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <h2 class="text-xl font-bold mb-6">Novo Fornecedor</h2>
                <input id="fNome" placeholder="Nome do Fornecedor" class="w-full p-3 border rounded-lg mb-4 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <button onclick="salvarFornecedor()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Salvar</button>
                <button onclick="renderizarFornecedores()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>`;
        }

        function salvarFornecedor() {
            const nome = document.getElementById('fNome').value.trim();
            if(nome) dbFornecedores.push({ nome });
            renderizarFornecedores();
        }

        function excluirFornecedor(index) { dbFornecedores.splice(index, 1); renderizarFornecedores(); }

        // ================= MOVIMENTAÇÕES =================
        function renderizarMovimentacoes() {
            let linhas = '';
            if (dbMovimentacoes && dbMovimentacoes.length > 0) {
                linhas = dbMovimentacoes.map(m => `
                    <tr class="border-b dark:border-gray-700 text-sm">
                        <td class="p-3">${m.data}</td>
                        <td class="p-3 font-semibold">${m.produto}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-xs font-bold ${m.tipo.includes('Foto') ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'}">${m.tipo}</span></td>
                        <td class="p-3">${m.qtd} un</td>
                    </tr>
                `).join('');
            }
            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-bold">Histórico de Movimentações</h1>
                    <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold">Voltar</button>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 responsive-table">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 text-xs font-bold uppercase">
                                <th class="p-3">Data</th><th class="p-3">Produto</th><th class="p-3">Ação</th><th class="p-3">Quantidade</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="4" class="p-6 text-center text-gray-400 italic">Nenhuma movimentação realizada ainda.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // ================= RELATÓRIOS =================
        function renderizarRelatorios() {
            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-bold">Relatórios e Exportação</h1>
                    <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold w-24">Voltar</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border dark:border-gray-700 text-center">
                        <i class="fas fa-file-pdf text-red-500 text-4xl mb-3"></i>
                        <h3 class="font-bold text-lg mb-2">Imprimir Inventário</h3>
                        <p class="text-gray-400 text-sm mb-4">Gere uma versão formatada para impressão ou exportação em PDF.</p>
                        <button onclick="gerarPdfImpressao()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold w-full">Gerar Impressão</button>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border dark:border-gray-700 text-center">
                        <i class="fas fa-file-excel text-green-500 text-4xl mb-3"></i>
                        <h3 class="font-bold text-lg mb-2">Exportar Dados (CSV)</h3>
                        <p class="text-gray-400 text-sm mb-4">Faça o download de todos os seus produtos para utilizar no Excel.</p>
                        <button onclick="exportarCsv()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold w-full">Exportar Planilha</button>
                    </div>
                </div>
            </div>`;
        }

        function gerarPdfImpressao() {
            const printArea = document.getElementById("print-area");
            let linhas = dbProdutos.map(p => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 8px;">${p.nome} (${p.categoria || 'Sem Categoria'})</td>
                    <td style="padding: 8px;">${p.qtd} un</td>
                    <td style="padding: 8px;">${p.status}</td>
                </tr>
            `).join('');

            printArea.innerHTML = `
                <div style="font-family: sans-serif; color: black;">
                    <h1 style="font-size: 24px; font-weight: bold; margin-bottom: 5px;">LOGÍSTICA ESCOLAR - ${schoolGlobal.toUpperCase()}</h1>
                    <p style="font-size: 12px; color: #555; margin-bottom: 20px;">Relatório emitido em: ${new Date().toLocaleDateString('pt-BR')} | Operador: ${perfilGlobal}</p>
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="background-color: #f5f5f5; border-bottom: 2px solid #ddd;">
                                <th style="padding: 8px;">Produto</th>
                                <th style="padding: 8px;">Quantidade</th>
                                <th style="padding: 8px;">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhas || '<tr><td colspan="3" style="padding: 20px; text-align: center; color: #999;">Sem itens no estoque.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
            window.print();
        }

        function exportarCsv() {
            if (dbProdutos.length === 0) {
                alert("Sem produtos para exportar.");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,Produto,Categoria,Quantidade,Status\n";
            dbProdutos.forEach(p => {
                csvContent += `"${p.nome}","${p.categoria || 'Sem Categoria'}",${p.qtd},"${p.status}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `estoque_${schoolGlobal.toLowerCase().replace(/\s+/g, '_')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ================= CONFIGURAÇÕES =================
        function renderizarConfiguracoes() {
            document.getElementById("app").innerHTML = `
            <div class="fade-in max-w-md mx-auto bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700 mt-5">
                <h2 class="text-xl font-bold mb-6">Configurações Gerais</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Limite para Estoque Baixo (Alerta)</label>
                        <input id="cfgLimite" type="number" value="${limiteEstoqueBaixo}" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold">Notificações por Alerta</span>
                        <input id="cfgNotif" type="checkbox" ${notificacoesAtivas ? 'checked' : ''} class="w-5 h-5 accent-blue-600">
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-sm font-semibold">Tema Escuro</span>
                        <button onclick="alternarModoEscuro()" class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white px-3 py-1.5 rounded-lg text-xs font-bold">
                            ${modoEscuroAtivo ? 'Desativar' : 'Ativar'}
                        </button>
                    </div>

                    <div class="pt-4 border-t dark:border-gray-700">
                        <button onclick="salvarConfig()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-md">Salvar Alterações</button>
                        <button onclick="entrarSistema()" class="w-full mt-2 text-gray-400">Cancelar</button>
                    </div>
                </div>
            </div>`;
        }

        function alternarModoEscuro() {
            modoEscuroAtivo = !modoEscuroAtivo;
            if(modoEscuroAtivo) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            renderizarConfiguracoes();
        }

        function salvarConfig() {
            limiteEstoqueBaixo = parseInt(document.getElementById('cfgLimite').value) || 10;
            notificacoesAtivas = document.getElementById('cfgNotif').checked;
            alert("✅ Configurações salvas!");
            entrarSistema();
        }

        window.onload = telaInicial;
    </script>
</body>
</html>
