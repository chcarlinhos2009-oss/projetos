<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Compartilhada com Leitor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0A4B99',
                        secondary: '#1E68C4',
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* Garante que tabelas fiquem legíveis no celular sem quebrar o layout */
        .responsive-table {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media print {
            body { background: white !important; padding: 0; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; }
            .border { border: 1px solid #ddd !important; }
            tr { page-break-inside: avoid; }
        }
        .print-only { display: none; }
    </style>
</head>

<body class="p-4 sm:p-6 bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen">

    <div id="print-area" class="print-only max-w-4xl mx-auto p-4"></div>

    <div id="app" class="no-print max-w-4xl mx-auto"></div>

    <script>
        // === VARIÁVEIS DE ESTADO E CONFIGURAÇÕES ===
        let perfilGlobal = '';
        let schoolGlobal = ''; 
        let usuarioCadastrado = 'admin@admin.com'; 
        let senhaCadastrada = '123';
        
        let limiteEstoqueBaixo = 10; 
        let modoEscuroAtivo = false;
        let notificacoesAtivas = true;
        let html5QrcodeScanner = null;

        // Banco de dados limpo e zerado
        let dbProdutos = [];
        let dbCategorias = [];
        let dbFornecedores = [];
        let dbMovimentacoes = [];

        function atualizarStatusProdutos() {
            dbProdutos.forEach(p => {
                p.status = p.qtd > limiteEstoqueBaixo ? 'OK' : 'Baixo';
                p.statusCor = p.qtd > limiteEstoqueBaixo ? 'green' : 'red';
            });
        }

        function dispararNotificacao(titulo, mensagem) {
            if (notificacoesAtivas) {
                alert(`🔔 NOTIFICAÇÃO DA ESCOLA\n\n🔹 ${titulo}\n${mensagem}`);
            }
        }

        // ================= TELA INICIAL =================
        function telaInicial() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto text-center fade-in mt-10 px-2">
                <i class="fas fa-school text-blue-600 text-6xl mb-4"></i>
                <h1 class="text-4xl font-bold mb-2 text-gray-800 dark:text-white">Logística Escolar</h1>
                <p class="text-gray-500 dark:text-gray-400 mb-8">Selecione seu perfil de acesso</p>
                <div class="space-y-4">
                    <button onclick="abrirLogin('Gestor')" class="w-full bg-primary hover:bg-blue-800 text-white p-4 rounded-xl transition-all font-semibold">
                        <i class="fas fa-user-tie mr-2"></i> Gestor
                    </button>
                    <button onclick="abrirLogin('Funcionário')" class="w-full bg-primary hover:bg-blue-800 text-white p-4 rounded-xl transition-all font-semibold">
                        <i class="fas fa-user-tag mr-2"></i> Funcionário
                    </button>
                </div>
            </div>`;
        }

        // ================= LOGIN COM VÍNCULO DE ESCOLA =================
        function abrirLogin(perfil) {
            perfilGlobal = perfil;
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto fade-in mt-10 bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700">
                <h2 class="text-2xl font-bold mb-2 text-gray-800 dark:text-white">Acesso ao Sistema</h2>
                <p class="text-blue-600 dark:text-blue-400 mb-6 font-medium italic">Perfil atual: ${perfil}</p>
                <div id="mensagem-erro" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm"></div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Identificação da Unidade</label>
                        <input id="escola" type="text" placeholder="Nome da Escola / Instituição" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1 text-gray-400">Credenciais</label>
                        <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none mb-2">
                        <input id="senha" type="password" placeholder="Senha" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none">
                    </div>
                    
                    <button onclick="validarLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all shadow-md">
                        Entrar e Conectar Dados
                    </button>
                    <button onclick="abrirCadastro()" class="w-full text-blue-600 dark:text-blue-400 text-sm font-semibold mt-2">Cadastre-se</button>
                </div>
                <button onclick="telaInicial()" class="mt-8 text-gray-400 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Voltar</button>
            </div>`;
        }

        function abrirCadastro() {
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto fade-in mt-10 bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Cadastro</h2>
                <input id="emailCad" type="email" placeholder="Novo Email" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white mb-4">
                <input id="senhaCad" type="password" placeholder="Nova Senha" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white mb-4">
                <button onclick="salvarCadastro()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Salvar</button>
            </div>`;
        }

        function salvarCadastro() {
            usuarioCadastrado = document.getElementById('emailCad').value;
            senhaCadastrada = document.getElementById('senhaCad').value;
            alert('✅ Cadastro realizado!');
            abrirLogin(perfilGlobal);
        }

        function validarLogin() {
            const escola = document.getElementById('escola').value.trim();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if (!escola) {
                document.getElementById('mensagem-erro').classList.remove('hidden');
                document.getElementById('mensagem-erro').innerText = "Por favor, digite o nome da escola.";
                return;
            }

            if ((email === usuarioCadastrado && senha === senhaCadastrada) || (email === 'admin@admin.com' && senha === '123') || perfilGlobal === 'Funcionário') {
                schoolGlobal = escola; 
                entrarSistema();
            } else {
                document.getElementById('mensagem-erro').classList.remove('hidden');
                document.getElementById('mensagem-erro').innerText = "Dados de login incorretos.";
            }
        }

        // ================= DASHBOARD COMPARTILHADO =================
        function entrarSistema() {
            fecharLeitorSeAberto();
            const produtosCriticos = dbProdutos.filter(p => p.qtd <= limiteEstoqueBaixo);
            let bannerAlerta = '';
            
            if (produtosCriticos.length > 0 && notificacoesAtivas) {
                bannerAlerta = `
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl text-red-800 dark:bg-red-900/20 dark:text-red-300 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-bell animate-bounce text-xl text-red-600"></i>
                        <span class="text-sm font-medium">Aviso: <strong>${produtosCriticos.length} item(s)</strong> na lista crítica de estoque baixo!</span>
                    </div>
                    <button onclick="abrirTela('produtos')" class="text-xs uppercase font-bold underline">Ver Itens</button>
                </div>`;
            }

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-8 bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div>
                        <h1 class="text-xl font-bold flex items-center gap-2 text-gray-800 dark:text-white truncate max-w-[180px] sm:max-w-none">
                            <i class="fas fa-school text-blue-600"></i> ${schoolGlobal.toUpperCase()}
                        </h1>
                        <p class="text-xs text-blue-600 dark:text-blue-400 font-medium">Operador: ${perfilGlobal}</p>
                    </div>
                    <button onclick="telaInicial()" class="text-red-600 font-bold hover:underline text-sm"><i class="fas fa-sign-out-alt"></i> Desconectar</button>
                </div>
                
                ${bannerAlerta}
                
                <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4">
                    <button onclick="abrirTela('produtos')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-boxes text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Produtos</h3><p class="text-xs text-gray-400">Ver e gerenciar estoque</p>
                    </button>
                    <button onclick="abrirTela('categories')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-tags text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Categorias</h3><p class="text-xs text-gray-400">Divisões de materiais</p>
                    </button>
                    <button onclick="abrirTela('fornecedores')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-truck text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Fornecedores</h3><p class="text-xs text-gray-400">Lista de parceiros</p>
                    </button>
                    <button onclick="abrirTela('movimentacoes')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-exchange-alt text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Movimentações</h3><p class="text-xs text-gray-400">Histórico de entradas e saídas</p>
                    </button>
                    <button onclick="abrirTela('relatorios')" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left">
                        <i class="fas fa-chart-line text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Relatórios</h3><p class="text-xs text-gray-400">Balanços e impressão</p>
                    </button>
                    <button onclick="${perfilGlobal === 'Gestor' ? "abrirTela('configuracoes')" : "alert('❌ Acesso Restrito: Apenas o Gestor pode alterar as configurações globais da escola.')"}" class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-transparent hover:border-blue-400 transition-all text-left ${perfilGlobal !== 'Gestor' ? 'opacity-60 cursor-not-allowed' : ''}">
                        <i class="fas fa-cog text-blue-500 text-2xl mb-2"></i>
                        <h3 class="font-bold text-sm sm:text-base">Configurações ${perfilGlobal !== 'Gestor' ? '🔒' : ''}</h3><p class="text-xs text-gray-400">Parâmetros do sistema</p>
                    </button>
                </div>
            </div>`;
        }

        function abrirTela(tela) {
            if (tela === 'produtos') renderizarProdutos();
            else if (tela === 'categories') renderizarCategorias();
            else if (tela === 'fornecedores') renderizarFornecedores();
            else if (tela === 'movimentacoes') renderizarMovimentacoes();
            else if (tela === 'relatorios') renderizarRelatorios();
            else if (tela === 'configuracoes') renderizarConfiguracoes();
        }

        // ================= PRODUTOS COMPARTILHADOS (COM LEITOR) =================
        function renderizarProdutos() {
            let linhas = dbProdutos.map((p, index) => `
                <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm">
                    <td class="p-3 font-semibold">${p.nome}</td>
                    <td class="p-3">${p.qtd} un</td>
                    <td class="p-3"><span class="bg-${p.statusCor}-100 text-${p.statusCor}-700 dark:bg-${p.statusCor}-900/30 dark:text-${p.statusCor}-400 px-2 py-1 rounded text-xs font-bold">${p.status}</span></td>
                    <td class="p-3 text-right space-x-2 whitespace-nowrap">
                        <button onclick="abrirFormProd(${index})" class="text-orange-500 font-bold hover:underline">Lançar Qtd</button>
                        ${perfilGlobal === 'Gestor' ? `<button onclick="excluirProd(${index})" class="text-red-500 font-bold hover:underline">Excluir</button>` : ''}
                    </td>
                </tr>
            `).join('');

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                    <h1 class="text-2xl font-bold">📦 Estoque - ${schoolGlobal}</h1>
                    <div class="grid grid-cols-2 sm:flex flex-wrap gap-2 w-full sm:w-auto">
                        <button onclick="ativarCameraLeitor()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 text-xs sm:text-sm">
                            <i class="fas fa-camera"></i> Escanear Código
                        </button>
                        <button onclick="abrirFormProd()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-lg font-bold flex items-center justify-center text-xs sm:text-sm">+ Adicionar Novo</button>
                        <button onclick="entrarSistema()" class="col-span-2 sm:col-auto bg-gray-200 dark:bg-gray-700 px-4 py-2.5 rounded-lg font-bold text-xs sm:text-sm text-center">Voltar</button>
                    </div>
                </div>

                <div id="container-leitor" class="hidden bg-white dark:bg-gray-800 p-4 rounded-xl shadow-md border dark:border-gray-700 mb-6 max-w-md mx-auto text-center">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs sm:text-sm font-bold text-blue-600 flex items-center gap-1"><i class="fas fa-eye"></i> Centralize o QR / Código de Barras</span>
                        <button onclick="fecharLeitorSeAberto()" class="text-red-500 font-bold text-xs uppercase bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded">Fechar X</button>
                    </div>
                    <div id="leitor-camera" class="w-full rounded-lg overflow-hidden bg-black"></div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 responsive-table">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 text-xs font-bold uppercase">
                                <th class="p-3">Produto</th><th class="p-3">Qtd</th><th class="p-3">Status</th><th class="p-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="4" class="p-6 text-center text-gray-400 text-sm italic">Nenhum produto cadastrado no estoque.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // ================= MECANISMO DO LEITOR ÓPTICO COMPATÍVEL =================
        function activarCameraLeitor() {
            const container = document.getElementById("container-leitor");
            container.classList.remove("hidden");

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("❌ Erro de Segurança: Seu navegador bloqueou o acesso à câmera. Se você estiver abrindo o arquivo direto no navegador, certifique-se de dar as permissões necessárias ou use um navegador moderno como Chrome/Edge.");
                container.classList.add("hidden");
                return;
            }

            try {
                html5QrcodeScanner = new Html5QrcodeScanner("leitor-camera", { 
                    fps: 15, 
                    qrbox: (width, height) => {
                        const minDim = Math.min(width, height);
                        return { width: Math.floor(minDim * 0.7), height: Math.floor(minDim * 0.6) };
                    },
                    rememberLastUsedCamera: true,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                });

                html5QrcodeScanner.render((textoEscaneado) => {
                    fecharLeitorSeAberto();
                    const indexEncontrado = dbProdutos.findIndex(p => p.nome.toLowerCase().trim() === textoEscaneado.toLowerCase().trim());
                    
                    if (indexEncontrado !== -1) {
                        alert(`🎯 Item Identificado: "${dbProdutos[indexEncontrado].nome}"`);
                        abrirFormProd(indexEncontrado);
                    } else {
                        if (confirm(`❓ Código lido: "${textoEscaneado}".\nEste item não consta no sistema. Deseja cadastrá-lo agora com esse nome?`)) {
                            abrirFormProd(null);
                            document.getElementById('pNome').value = textoEscaneado;
                        } else {
                            renderizarProdutos();
                        }
                    }
                }, (erro) => {
                    // Execução quadro a quadro fluida
                });
            } catch (err) {
                alert("❌ Erro ao iniciar a câmera: Verifique se ela não está sendo usada por outro aplicativo ou se as permissões de privacidade foram concedidas.");
                container.classList.add("hidden");
            }
        }

        function fecharLeitorSeAberto() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(err => console.log("Câmera encerrada."));
                html5QrcodeScanner = null;
            }
            const container = document.getElementById("container-leitor");
            if (container) container.classList.add("hidden");
        }

        function abrirFormProd(index = null) {
            fecharLeitorSeAberto();
            const p = index !== null ? dbProdutos[index] : { nome: '', qtd: '', desc: '', ref: '' };
            const desabilitarNome = (index !== null && perfilGlobal !== 'Gestor') ? 'disabled' : '';

            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <h2 class="text-xl font-bold mb-6">${index !== null ? 'Movimentar' : 'Cadastrar'} Produto</h2>
                <label class="block text-xs text-gray-400 font-bold mb-1">Nome do Item</label>
                <input id="pNome" placeholder="Ex: Papel A4 Premium" value="${p.nome}" ${desabilitarNome} class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white disabled:opacity-50 outline-none">
                <label class="block text-xs text-gray-400 font-bold mb-1">Quantidade Atual / Nova</label>
                <input id="pQtd" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Quantidade" value="${p.qtd}" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <button onclick="salvarProd(${index})" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-md active:scale-95">Confirmar e Atualizar</button>
                <button onclick="renderizarProdutos()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>`;
        }

        function salvarProd(index) {
            const n = document.getElementById('pNome').value.trim();
            const q = parseInt(document.getElementById('pQtd').value);
            const dataAtual = new Date().toLocaleString('pt-BR');

            if (!n || isNaN(q)) { alert("Preencha os campos de forma válida."); return; }

            const status = q > limiteEstoqueBaixo ? 'OK' : 'Baixo';
            const statusCor = q > limiteEstoqueBaixo ? 'green' : 'red';
            
            if (index !== null) {
                const qtdAntiga = dbProdutos[index].qtd;
                const diferenca = q - qtdAntiga;
                
                if (diferenca > 0) {
                    dbMovimentacoes.unshift({ data: dataAtual, tipo: `Entrada (${perfilGlobal})`, produto: n, qtd: diferenca });
                } else if (diferenca < 0) {
                    dbMovimentacoes.unshift({ data: dataAtual, tipo: `Saída (${perfilGlobal})`, produto: n, qtd: Math.abs(diferenca) });
                    if(q <= limiteEstoqueBaixo) {
                        dispararNotificacao("Alerta de Estoque Crítico", `O item "${n}" foi retirado por um ${perfilGlobal} e está abaixo do limite mínimo!`);
                    }
                }
                dbProdutos[index] = { nome: n, qtd: q, status, statusCor };
            } else {
                dbMovimentacoes.unshift({ data: dataAtual, tipo: `Cadastro Inicial`, produto: n, qtd: q });
                dbProdutos.push({ nome: n, qtd: q, status, statusCor });
            }
            renderizarProdutos();
        }

        function excluirProd(index) { 
            if(confirm("Deseja deletar permanentemente este item do estoque da escola?")) { 
                const dataAtual = new Date().toLocaleString('pt-BR');
                dbMovimentacoes.unshift({ data: dataAtual, tipo: "Item Excluído", produto: dbProdutos[index].nome, qtd: dbProdutos[index].qtd });
                dbProdutos.splice(index, 1); 
                renderizarProdutos(); 
            } 
        }

        // ================= HISTÓRICO DE MOVIMENTAÇÕES =================
        function renderizarMovimentacoes() {
            let linhas = dbMovimentacoes.map(m => `
                <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm">
                    <td class="p-3 text-gray-500 dark:text-gray-400 font-medium whitespace-nowrap">${m.data}</td>
                    <td class="p-3 whitespace-nowrap">
                        <span class="px-2 py-1 rounded text-xs font-bold ${m.tipo.includes('Entrada') || m.tipo.includes('Inicial') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${m.tipo}
                        </span>
                    </td>
                    <td class="p-3 font-semibold">${m.produto}</td>
                    <td class="p-3 font-bold ${m.tipo.includes('Entrada') || m.tipo.includes('Inicial') ? 'text-green-600' : 'text-red-600'}">${m.qtd} un</td>
                </tr>
            `).join('');

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold"><i class="fas fa-exchange-alt mr-2 text-blue-600"></i> Histórico da Unidade</h1>
                    <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold">Voltar</button>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 responsive-table">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 text-gray-500 dark:text-gray-400 text-xs uppercase font-bold">
                            <tr>
                                <th class="p-3">Data / Hora</th>
                                <th class="p-3">Operação</th>
                                <th class="p-3">Produto</th>
                                <th class="p-3">Quantidade</th>
                            </tr>
                        </thead>
                        <tbody>${linhas || '<tr><td colspan="4" class="p-10 text-center text-gray-400 italic">Nenhuma alteração registrada nesta escola.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`;
        }

        // ================= RELATÓRIOS E IMPRESSÃO =================
        function renderizarRelatorios() {
            const totalProdutos = dbProdutos.reduce((acc, p) => acc + p.qtd, 0);
            const itensBaixos = dbProdutos.filter(p => p.qtd <= limiteEstoqueBaixo).length;
            const totalMovimentos = dbMovimentacoes.length;

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold"><i class="fas fa-chart-line mr-2 text-blue-600"></i> Relatórios da Central</h1>
                    <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold">Voltar</button>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-6 mb-8">
                    <div class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-blue-500 col-span-1">
                        <p class="text-gray-400 text-xs uppercase font-bold">Volume Total</p>
                        <p class="text-2xl sm:text-3xl font-bold mt-1">${totalProdutos} un</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-red-500 col-span-1">
                        <p class="text-gray-400 text-xs uppercase font-bold">Faltas Críticas</p>
                        <p class="text-2xl sm:text-3xl font-bold mt-1">${itensBaixos} itens</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-green-500 col-span-2 sm:col-span-1">
                        <p class="text-gray-400 text-xs uppercase font-bold">Registros</p>
                        <p class="text-2xl sm:text-3xl font-bold mt-1">${totalMovimentos} ações</p>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-xl shadow-sm text-center border dark:border-gray-700">
                    <i class="fas fa-print text-blue-600 text-5xl mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">Imprimir Balanço Atual</h3>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto mb-6 text-sm">Gere planilhas unificadas para prestação de contas na diretoria da escola.</p>
                    
                    <div class="flex flex-col sm:flex-row justify-center gap-3">
                        <button onclick="exportarPlanilha()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md inline-flex items-center justify-center gap-2">
                            <i class="fas fa-file-csv"></i> Baixar Planilha (.CSV)
                        </button>
                        <button onclick="imprimirRelatorioDireto()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md inline-flex items-center justify-center gap-2">
                            <i class="fas fa-print"></i> Imprimir Direto
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function exportarPlanilha() {
            let csvContent = "\uFEFF"; 
            csvContent += `=== RELATÓRIO DA INSTITUIÇÃO: ${schoolGlobal.toUpperCase()} ===\n`;
            csvContent += "Produto;Quantidade;Status\n";
            dbProdutos.forEach(p => { csvContent += `${p.nome};${p.qtd};${p.status}\n`; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `estoque_${schoolGlobal}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function imprimirRelatorioDireto() {
            const dataImpressao = new Date().toLocaleString('pt-BR');
            let htmlProdutos = dbProdutos.map(p => `<tr style="border-bottom: 1px solid #ddd;"><td style="padding: 8px;">${p.nome}</td><td style="padding: 8px;">${p.qtd} un</td><td style="padding: 8px;">${p.status}</td></tr>`).join('');
            document.getElementById('print-area').innerHTML = `
                <div style="border-bottom: 2px solid #0A4B99; padding-bottom: 10px; margin-bottom: 20px; color: black;">
                    <h1 style="font-size: 24px; font-weight: bold; color: #0A4B99;">${schoolGlobal.toUpperCase()} - Inventário Geral</h1>
                    <p style="font-size: 12px; color: #666;">Data de extração: ${dataImpressao}</p>
                </div>
                <table style="width: 100%; text-align: left; border-collapse: collapse; color: black;"><thead style="background-color: #f2f2f2;"><tr><th style="padding: 8px;">Produto</th><th style="padding: 8px;">Qtd</th><th style="padding: 8px;">Alerta</th></tr></thead><tbody>${htmlProdutos}</tbody></table>`;
            window.print();
        }

        // ================= CATEGORIAS DE ITENS =================
        function renderizarCategorias() {
            let linhas = dbCategorias.map((cat, index) => `
                <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                    <td class="p-3 font-semibold">${cat.nome}</td>
                    <td class="p-3 text-right">
                        ${perfilGlobal === 'Gestor' ? `
                            <button onclick="abrirFormCat(${index})" class="text-orange-500 font-bold">Editar</button>
                            <button onclick="excluirCat(${index})" class="text-red-500 font-bold ml-2">Excluir</button>
                        ` : '<span class="text-gray-400 text-xs">Visualização</span>'}
                    </td>
                </tr>
            `).join('');

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-bold">Categorias estruturadas</h1>
                    <div class="space-x-2">
                        ${perfilGlobal === 'Gestor' ? '<button onclick="abrirFormCat()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">+ Nova</button>' : ''}
                        <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold">Voltar</button>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border dark:border-gray-700 overflow-hidden"><table class="w-full text-left"><tbody>${linhas || '<tr><td class="p-4 text-center text-gray-400 text-sm italic">Nenhuma categoria registrada.</td></tr>'}</tbody></table></div>
            </div>`;
        }

        function abrirFormCat(index = null) {
            const c = index !== null ? dbCategorias[index] : { nome: '', desc: '' };
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <h2 class="text-xl font-bold mb-6">Nome do Agrupador</h2>
                <input id="cNome" placeholder="Nome" value="${c.nome}" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <button onclick="salvarCat(${index})" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Salvar</button>
                <button onclick="renderizarCategorias()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>`;
        }

        function salvarCat(index) {
            const n = document.getElementById('cNome').value.trim();
            if(!n) return;
            if (index !== null) dbCategorias[index].nome = n; else dbCategorias.push({ nome: n, desc: '' });
            renderizarCategorias();
        }

        function excluirCat(index) { if(confirm("Excluir?")) { dbCategorias.splice(index, 1); renderizarCategorias(); } }

        // ================= FORNECEDORES COMPARTILHADOS =================
        function renderizarFornecedores() {
            let lines = dbFornecedores.map((f, index) => `
                <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                    <td class="p-3">
                        <p class="font-bold">${f.nome}</p>
                        <p class="text-xs text-gray-500">${f.cnpj}</p>
                    </td>
                    <td class="p-3 text-sm text-gray-600 dark:text-gray-300">
                        <p><i class="fas fa-phone mr-1"></i> ${f.tel}</p>
                        <p><i class="fas fa-envelope mr-1"></i> ${f.email}</p>
                    </td>
                    <td class="p-3 text-right whitespace-nowrap">
                        ${perfilGlobal === 'Gestor' ? `
                            <button onclick="abrirFormFornecedor(${index})" class="text-orange-500 font-bold">Editar</button>
                            <button onclick="excluirFornecedor(${index})" class="text-red-500 font-bold ml-2">Excluir</button>
                        ` : '<span class="text-gray-400 text-xs">Apenas Leitura</span>'}
                    </td>
                </tr>
            `).join('');

            document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl sm:text-2xl font-bold"><i class="fas fa-truck mr-2"></i> Fornecedores Homologados</h1>
                    <div class="space-x-1 sm:space-x-2 whitespace-nowrap">
                        ${perfilGlobal === 'Gestor' ? `<button onclick="abrirFormFornecedor()" class="bg-green-600 text-white px-3 sm:px-4 py-2 rounded-lg font-bold text-xs sm:text-sm">+ Novo</button>` : ''}
                        <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-3 sm:px-4 py-2 rounded-lg font-bold text-xs sm:text-sm">Voltar</button>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border dark:border-gray-700 responsive-table"><table class="w-full text-left border-collapse"><tbody>${lines || '<tr><td class="p-6 text-center text-gray-400 text-sm italic">Nenhum fornecedor catalogado.</td></tr>'}</tbody></table></div>
            </div>`;
        }

        function abrirFormFornecedor(index = null) {
            const f = index !== null ? dbFornecedores[index] : { nome: '', cnpj: '', tel: '', email: '' };
            document.getElementById("app").innerHTML = `
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border dark:border-gray-700 mt-10">
                <input id="fNome" placeholder="Nome" value="${f.nome}" class="w-full p-3 border rounded-lg mb-2 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <input id="fCnpj" placeholder="CNPJ" value="${f.cnpj}" class="w-full p-3 border rounded-lg mb-2 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <input id="fTel" placeholder="Telefone" value="${f.tel}" class="w-full p-3 border rounded-lg mb-2 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <input id="fEmail" placeholder="Email" value="${f.email}" class="w-full p-3 border rounded-lg mb-4 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none">
                <button onclick="salvarFornecedor(${index})" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-md">Salvar</button>
                <button onclick="renderizarFornecedores()" class="w-full mt-2 text-gray-400 text-sm">Cancelar</button>
            </div>`;
        }

        function salvarFornecedor(index) {
            const nome = document.getElementById('fNome').value.trim();
            const cnpj = document.getElementById('fCnpj').value.trim();
            const tel = document.getElementById('fTel').value.trim();
            const email = document.getElementById('fEmail').value.trim();
            if(!nome) return;
            if (index !== null) dbFornecedores[index] = { nome, cnpj, tel, email }; else dbFornecedores.push({ nome, cnpj, tel, email });
            renderizarFornecedores();
        }

        function excluirFornecedor(index) { if(confirm("Remover?")) { dbFornecedores.splice(index, 1); renderizarFornecedores(); } }

        // ================= CONFIGURAÇÕES AVANÇADAS =================
        function renderizarConfiguracoes() {
            document.getElementById("app").innerHTML = `
            <div class="fade-in space-y-6">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold"><i class="fas fa-cog mr-2 text-blue-600"></i> Painel Administrativo</h1>
                    <button onclick="entrarSistema()" class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-bold">Voltar</button>
                </div>
                
                <div class="space-y-6">
                    <div class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border border-blue-200 dark:border-gray-700">
                        <h3 class="text-lg font-bold mb-2 flex items-center gap-2 text-blue-700 dark:text-blue-400"><i class="fas fa-database"></i> Segurança e Cópia de Segurança (Backup)</h3>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Evite perda de dados. Baixe um arquivo de segurança no computador ou restaure dados antigos.</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button onclick="executarBackup()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 shadow-sm transition-all">
                                <i class="fas fa-download"></i> Gerar Backup Completo (.JSON)
                            </button>
                            
                            <label class="bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 cursor-pointer transition-all border border-gray-300 dark:border-gray-600 text-center">
                                <i class="fas fa-upload"></i> Restaurar Banco de Dados
                                <input type="file" id="arquivoBackup" accept=".json" onchange="executarRestauracao(event)" class="hidden">
                            </label>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border dark:border-gray-700">
                        <h3 class="text-lg font-bold mb-2">Gatilho de Alerta Escolar</h3>
                        <div class="flex gap-3 max-w-xs">
                            <input id="cfgLimite" type="number" inputmode="numeric" value="${limiteEstoqueBaixo}" class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-gray-700 outline-none">
                            <button onclick="salvarLimiteEstoque()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Definir</button>
                        </div>
                    </div>
                    
                    <div class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border dark:border-gray-700 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-sm sm:text-base">Mecanismo de Avisos Pop-Up</h3>
                        <button onclick="alternarNotificacoes()" class="px-5 py-2 rounded-xl font-bold text-sm ${notificacoesAtivas ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${notificacoesAtivas ? 'Ativado' : 'Desativado'}</button>
                    </div>
                    
                    <div class="bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-xl shadow-sm border dark:border-gray-700 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-sm sm:text-base">Modo Escuro (Aparência)</h3>
                        <button onclick="alternarModoEscuro()" class="px-5 py-2 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold text-sm">${modoEscuroAtivo ? '☀️ Claro' : '🌙 Escuro'}</button>
                    </div>
                </div>
            </div>`;
        }

        // ================= MÉTODOS DE EXTRAÇÃO E CARGA BACKUP =================
        function executarBackup() {
            const pacoteDados = {
                escola: schoolGlobal,
                limiteMinimo: limiteEstoqueBaixo,
                produtos: dbProdutos,
                categorias: dbCategorias,
                fornecedores: dbFornecedores,
                movimentacoes: dbMovimentacoes
            };

            const stringDados = JSON.stringify(pacoteDados, null, 2);
            const blob = new Blob([stringDados], { type: "application/json;charset=utf-8" });
            const urlBlob = URL.createObjectURL(blob);
            
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = urlBlob;
            downloadAnchor.download = `BACKUP_ESTOQUE_${schoolGlobal.toUpperCase().replace(/\s+/g, '_')}.json`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(urlBlob);
        }

        function executarRestauracao(evento) {
            const arquivo = evento.target.files[0];
            if (!arquivo) return;

            const leitor = new FileReader();
            leitor.onload = function(e) {
                try {
                    const dadosCarregados = JSON.parse(e.target.result);
                    
                    if (dadosCarregados.produtos && dadosCarregados.movimentacoes) {
                        dbProdutos = dadosCarregados.produtos;
                        dbCategorias = dadosCarregados.categorias || dadosCarregados.categories || [];
                        dbFornecedores = dadosCarregados.fornecedores || [];
                        dbMovimentacoes = dadosCarregados.movimentacoes;
                        
                        if (dadosCarregados.limiteMinimo) limiteEstoqueBaixo = parseInt(dadosCarregados.limiteMinimo);
                        if (dadosCarregados.escola) schoolGlobal = dadosCarregados.escola;
                        
                        atualizarStatusProdutos();
                        alert("✅ BANCO DE DADOS RESTAURADO!\nOs produtos, fornecedores e históricos foram importados com sucesso.");
                        renderizarConfiguracoes();
                    } else {
                        alert("❌ Arquivo inválido. Estrutura de dados do estoque não identificada.");
                    }
                } catch (erro) {
                    alert("❌ Falha crítica ao ler o arquivo JSON.");
                }
            };
            leitor.readAsText(arquivo);
        }

        function salvarLimiteEstoque() { limiteEstoqueBaixo = parseInt(document.getElementById('cfgLimite').value); atualizarStatusProdutos(); alert("Limite atualizado!"); }
        function alternarNotificacoes() { notificacoesAtivas = !notificacoesAtivas; renderizarConfiguracoes(); }
        function alternarModoEscuro() { modoEscuroAtivo = !modoEscuroAtivo; document.documentElement.classList.toggle('dark', modoEscuroAtivo); renderizarConfiguracoes(); }

        window.onload = telaInicial;
    </script>
</body>
</html>
